publish_mode: editorial_workflow
site_url: https://agender.org.uk

backend:
  name: github
  repo: agender-org-uk/agender.org.uk
  branch: main
  base_url: https://decap-proxy.engiqueer.net
  preview_context: deployment/cloudflare-pages

media_folder: src/assets
public_folder: /assets

collections:
- name: page
  label: Pages
  label_singular: Page
  folder: src/pages
  create: true
  preview_path: '{{ slug }}'
  nested:
    depth: 100
  fields:
  - label: Layout
    name: layout
    widget: hidden
    default: post
  - label: Title
    name: title
    widget: string
  - label: Content
    name: body
    widget: markdown
- name: resource
  label: Resources
  label_singular: Resource
  folder: src/resources
  create: true
  preview_path: 'resources/{{ slug }}'
  fields:
  - label: Layout
    name: layout
    widget: hidden
    default: post
  - label: Title
    name: title
    widget: string
  - label: URL
    name: url
    required: false
    widget: string
    hint: Set a URL for non-text resources (i.e. external or assets)
  - label: Content
    name: body
    widget: markdown
- name: your-stories
  label: Stories
  label_singular: Story
  folder: src/your-stories
  create: true
  preview_path: 'your-stories/{{ slug }}'
  fields:
  - label: Layout
    name: layout
    widget: hidden
    default: post
  - label: Title
    name: title
    widget: string
  - label: Content
    name: body
    widget: markdown
- name: data
  label: Data
  files:
  - label: "Members"
    name: "members"
    file: "data/members.json"
    editor:
      preview: false
    fields:
    - label: Members
      name: members
      widget: list
      fields:
      - label: Name
        name: name
      - label: Pronouns
        name: pronouns
      - label: Summary
        name: summary
        widget: markdown
      - label: GitHub Username
        name: github_username
      - label: GitHub Teams
        name: github_teams
        widget: list